data_ingestion:
  test_size: 0.20

feature_engineering:
  max_features: 5000

model_building:
  LogisticRegression:
    max_iter: 1000

  MultinomialNB:
    alpha: 1.5

  DecisionTreeClassifier:
    max_depth: 4
    class_weight: balanced

  KNeighborsClassifier:
    n_neighbors: 10

  RandomForestClassifier:
    n_estimators: 100
    max_depth: 5

  AdaBoostClassifier:
    n_estimators: 10
    learning_rate: 1.5

  BaggingClassifier:
    n_estimators: 10

  ExtraTreesClassifier:
    n_estimators: 100
    max_depth: 5

  GradientBoostingClassifier:
    n_estimators: 100
    learning_rate: 0.1
    max_depth: 5